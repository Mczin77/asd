<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Prompts para Vídeo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 68, 68, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(68, 138, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 198, 68, 0.03) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, 5%) rotate(1deg); }
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: transparent;
            color: #fff;
            padding: 40px 35px 35px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            opacity: 0.5;
            font-size: 14px;
            font-weight: 400;
        }

        .content {
            padding: 35px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.5;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s;
            letter-spacing: 0.2px;
        }

        .btn:hover {
            background: #f0f0f0;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 35px;
            padding: 0;
            background: transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 28px;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-header h3 {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .copy-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 7px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .result-text {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.75);
            max-height: 450px;
            overflow-y: auto;
            font-size: 14px;
        }

        .result-text::-webkit-scrollbar {
            width: 8px;
        }

        .result-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .result-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff6b6b;
            padding: 14px 16px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            margin-top: 18px;
            display: none;
            font-size: 13px;
        }

        .error.show {
            display: block;
        }

        .hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 7px;
            font-weight: 400;
        }

        .type-selector {
            display: flex;
            gap: 10px;
        }

        .type-btn {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .type-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.75);
        }

        .type-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease 2.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .intro-content {
            text-align: center;
            animation: introAnimation 2.5s ease;
        }

        @keyframes introAnimation {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            20% {
                opacity: 1;
                transform: translateY(0);
            }
            80% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .intro-content h2 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .intro-content p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .intro-content .discord {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="intro-screen">
        <div class="intro-content">
            <h2>Gerador de Prompts IA</h2>
            <p>Desenvolvido por</p>
            <p class="discord">Mczin7</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Gerador de Prompts para IA</h1>
            <p>Crie prompts detalhados para geração de vídeos e imagens com IA</p>
        </div>

        <div class="content">
            <form id="promptForm">
                <div class="form-group">
                    <label for="apiKey">API KEY</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        placeholder="Cole sua chave de API do Gemini"
                        required
                    >
                    <div class="hint">Sua chave será salva localmente no navegador | aistudio.google.com/apikey</div>
                </div>

                <div class="form-group">
                    <label for="contentType">TIPO DE CONTEÚDO</label>
                    <div class="type-selector">
                        <button type="button" class="type-btn active" data-type="video">Vídeo</button>
                        <button type="button" class="type-btn" data-type="image">Imagem</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="theme">TEMA</label>
                    <textarea 
                        id="theme" 
                        placeholder="Descreva o conceito ou ideia..."
                        required
                    ></textarea>
                    <div class="hint">Seja específico sobre o que você quer ver</div>
                </div>

                <button type="submit" class="btn" id="generateBtn">
                    Gerar Prompt
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Gerando...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result-container" id="resultContainer">
                <div class="result-header">
                    <h3>Resultado</h3>
                    <button class="copy-btn" id="copyBtn">Copiar</button>
                </div>
                <div class="result-text" id="resultText"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('promptForm');
        const apiKeyInput = document.getElementById('apiKey');
        const themeInput = document.getElementById('theme');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultContainer = document.getElementById('resultContainer');
        const resultText = document.getElementById('resultText');
        const copyBtn = document.getElementById('copyBtn');
        const typeBtns = document.querySelectorAll('.type-btn');

        let currentType = 'video';

        // Carregar API Key do localStorage ao iniciar
        window.addEventListener('DOMContentLoaded', () => {
            const savedApiKey = localStorage.getItem('gemini_api_key');
            if (savedApiKey) {
                apiKeyInput.value = savedApiKey;
            }
        });

        // Salvar API Key no localStorage quando o usuário digitar
        apiKeyInput.addEventListener('input', () => {
            const apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('gemini_api_key', apiKey);
            } else {
                localStorage.removeItem('gemini_api_key');
            }
        });

        // Alternar entre vídeo e imagem
        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
            });
        });

        // Copiar resultado
        copyBtn.addEventListener('click', () => {
            const text = resultText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = 'Copiado';
                setTimeout(() => {
                    copyBtn.textContent = 'Copiar';
                }, 2000);
            });
        });

        // Enviar formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiKey = apiKeyInput.value.trim();
            const theme = themeInput.value.trim();

            if (!apiKey || !theme) {
                showError('Por favor, preencha todos os campos!');
                return;
            }

            // Salvar API Key antes de fazer a requisição
            localStorage.setItem('gemini_api_key', apiKey);

            // Ocultar erro e resultado anteriores
            error.classList.remove('show');
            resultContainer.classList.remove('show');
            
            // Mostrar loading
            loading.classList.add('show');
            generateBtn.disabled = true;

            try {
                const prompts = {
                    video: `You are an expert in generating prompts for AI video generation. Create an EXTREMELY DETAILED and professional prompt for video generation based on the following theme:

THEME: ${theme}

The prompt should include:
1. Detailed visual description (colors, lighting, composition)
2. Camera movement and dynamics (angles, transitions, zoom)
3. Atmosphere and mood (feeling, emotional tone)
4. Artistic style and visual references
5. Technical details (4K/8K quality, suggested fps, aspect ratio)
6. Suggested sound elements (music, ambient sound effects)
7. Estimated duration and temporal structure (beginning, middle, end)
8. Visual effects and post-production

Format the prompt in a clear and organized way, ready to be used in tools like Runway, Pika, Luma AI, or similar.

IMPORTANT: Write the entire prompt in ENGLISH, ready to be used directly in AI video generation tools.`,

                    image: `You are an expert in generating prompts for AI image generation. Create an EXTREMELY DETAILED and professional prompt for image generation based on the following theme:

THEME: ${theme}

The prompt should include:
1. Complete visual description (composition, main and secondary elements)
2. Colors and palette (specific tones, saturation, contrast)
3. Lighting (type of light, direction, intensity, shadows)
4. Artistic style (photorealism, digital painting, 3D, illustration, etc.)
5. Atmosphere and mood (feeling the image conveys)
6. Technical details (resolution, quality, rendering)
7. Texture and materials
8. Perspective and framing
9. Artist or style references (if applicable)

Format the prompt in a clear and detailed way, ready to be used in tools like Midjourney, DALL-E, Stable Diffusion, Leonardo AI, or similar.

IMPORTANT: Write the entire prompt in ENGLISH, ready to be used directly in AI image generation tools.`
                };

                const prompt = prompts[currentType];

                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent', {
                    method: 'POST',
                    headers: {
                        'x-goog-api-key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Erro ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                    const generatedPrompt = data.candidates[0].content.parts[0].text;
                    resultText.textContent = generatedPrompt;
                    resultContainer.classList.add('show');
                } else {
                    throw new Error('Resposta inválida da API');
                }

            } catch (err) {
                console.error('Erro:', err);
                showError(`Erro ao gerar prompt: ${err.message}`);
            } finally {
                loading.classList.remove('show');
                generateBtn.disabled = false;
            }
        });

        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
            setTimeout(() => {
                error.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
